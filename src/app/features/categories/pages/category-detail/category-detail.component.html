<div>
  @if (loading$ | async) {
    <div class="loading-state">
      <div class="spinner"></div>
      <p>Loading category...</p>
    </div>
  } @else if (category$ | async; as category) {
    <app-breadcrumb></app-breadcrumb>

    <app-details-page-header
      (back)="onBack()"
      (edit)="onEdit()"
      (delete)="confirmDelete()"
      [title]="category.name"
    >
    </app-details-page-header>
    <div class="category-card">
      <div class="detail-content">
        <div class="category-info-section">
          <h2 class="section-title">Category Information</h2>
          <div class="info-cards-grid">
            <app-info-card
              title="Name"
              [value]="category.name"
              [icon]="Tag"
              backgroundColor="#f0f9ff"
              iconColor="#0ea5e9"
            >
            </app-info-card>

            <app-info-card
              title="Status"
              [icon]="CheckCircle"
              [backgroundColor]="category.status === 'Active' ? '#f0fdf4' : '#fef2f2'"
              [iconColor]="category.status === 'Active' ? '#22c55e' : '#ef4444'"
            >
              <div subtitle>
                <app-status-badge [value]="category.status || 'Active'"></app-status-badge>
              </div>
            </app-info-card>

            <app-info-card
              title="Created At"
              [value]="(category.createdAt | date: 'medium') ?? ''"
              [icon]="Calendar"
              backgroundColor="#faf5ff"
              iconColor="#a855f7"
            >
            </app-info-card>

            <app-info-card
              title="Updated At"
              [value]="(category.updatedAt | date: 'medium') ?? ''"
              [icon]="Calendar"
              backgroundColor="#eff6ff"
              iconColor="#3b82f6"
            >
            </app-info-card>
          </div>

          @if (category.description) {
            <div class="description-card">
              <h3 class="section-title">Description</h3>
              <div class="info-card">
                <p>{{ category.description }}</p>
              </div>
            </div>
          }
        </div>
      </div>
    </div>

    <app-confirm-dialog
      [isOpen]="showDeleteDialog"
      title="Delete Category"
      [message]="'Are you sure you want to delete ' + category.name + '?'"
      warningMessage="This action cannot be undone."
      confirmText="Delete"
      cancelText="Cancel"
      confirmButtonClass="btn-danger"
      (confirm)="onDelete()"
      (cancel)="cancelDelete()"
    ></app-confirm-dialog>
  } @else {
    <div class="not-found">
      <h2>Category Not Found</h2>
      <p>The category you're looking for doesn't exist.</p>
      <button class="btn btn-primary" (click)="onBack()">Back to Categories</button>
    </div>
  }
</div>
