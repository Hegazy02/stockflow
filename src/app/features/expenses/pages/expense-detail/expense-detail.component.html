<!-- Loading State -->
@if (loading$ | async) {
<div class="loading-container">
  <div class="loading-spinner"></div>
  <p>Loading expense details...</p>
</div>
} @else if (expense$ | async; as expense) {
<!-- Expense Content -->
<app-breadcrumb></app-breadcrumb>

<app-details-page-header
  (back)="navigateToList()"
  (edit)="navigateToEdit()"
  (delete)="confirmDelete()"
>
</app-details-page-header>

<div class="expense-content">
  <!-- Amount Card - Prominent Display -->
  <div class="amount-card-section">
    <app-info-card
      title="Amount"
      [value]="(expense.amount | currency)??0"
      [icon]="DollarSign"
      backgroundColor="#f0f9ff"
      iconColor="#0ea5e9"
    >
    </app-info-card>
  </div>

  <!-- Expense Information -->
  <div class="expense-info-section">
    <h2 class="section-title">Expense Information</h2>
    <div class="info-cards-grid">
      <app-info-card
        title="Title"
        [value]="expense.title"
        [icon]="FileText"
        backgroundColor="#faf5ff"
        iconColor="#a855f7"
      >
      </app-info-card>

      <app-info-card
        title="Category"
        [value]="expense.category"
        [icon]="Tag"
        backgroundColor="#fff7ed"
        iconColor="#f97316"
      >
      </app-info-card>

      <app-info-card
        title="Date"
        [value]="(expense.date | date : 'longDate')??''"
        [icon]="Calendar"
        backgroundColor="#f0fdf4"
        iconColor="#22c55e"
      >
      </app-info-card>

      <app-info-card
        title="Created At"
        [value]="(expense.createdAt | date : 'medium')??''"
        [icon]="Calendar"
        backgroundColor="#eff6ff"
        iconColor="#3b82f6"
      >
      </app-info-card>
    </div>

    @if (expense.note) {
      <div class="note-card">
        <div class="info-card">
          <h3>Note</h3>
          <p>{{ expense.note }}</p>
        </div>
      </div>
    }
  </div>
</div>

<!-- Delete Confirmation Dialog -->
<app-confirm-dialog
  [isOpen]="showDeleteConfirm"
  title="Delete Expense"
  [message]="'Are you sure you want to delete \'' + expenseTitle + '\'?'"
  warningMessage="This action cannot be undone."
  confirmText="Delete"
  cancelText="Cancel"
  confirmButtonClass="btn-danger"
  (confirm)="deleteExpense()"
  (cancel)="cancelDelete()"
></app-confirm-dialog>
} @else {
<!-- Not Found State -->
<div class="not-found">
  <div class="not-found-icon">
    <lucide-icon [img]="Banknote" [size]="48"></lucide-icon>
  </div>
  <h2>Expense Not Found</h2>
  <p>The expense you're looking for doesn't exist or has been deleted.</p>
  <button class="btn btn-primary" (click)="navigateToList()">Back to Expenses</button>
</div>
}
