<div class="stats-container">
  <app-breadcrumb></app-breadcrumb>

  <app-details-page-header [hasDelete]="false" [hasEdit]="false" (back)="onBack()">
  </app-details-page-header>
  <h1 class="section-title">Expense Statistics</h1>

  <div *ngIf="stats$ | async as stats" class="stats-content">
    <!-- Overall Cards -->
    <div class="overall-grid">
      <app-info-card
        title="Total Spends"
        [value]="(stats.overall.totalAmount | currency) ?? 0"
        [icon]="DollarSign"
        backgroundColor="#f0fdf4"
        iconColor="#22c55e"
      >
      </app-info-card>

      <app-info-card
        title="Total Transactions"
        [value]="stats.overall.count"
        [icon]="List"
        backgroundColor="#eff6ff"
        iconColor="#3b82f6"
      >
      </app-info-card>
    </div>

    <!-- Category Breakdown -->
    <div class="category-section">
      <div class="section-header">
        <h2>Breakdown by Category</h2>
      </div>

      <div class="category-grid">
        <app-info-card
          *ngFor="let cat of stats.byCategory"
          [title]="cat._id"
          [value]="(cat.totalAmount | currency) ?? 0"
          [icon]="TrendingUp"
          backgroundColor="#faf5ff"
          iconColor="#a855f7"
        >
          <div subtitle class="category-details">
            <span class="category-count">{{ cat.count }} transactions</span>
            <div class="progress-bar">
              <div
                class="progress-fill"
                [style.width.%]="(cat.totalAmount / stats.overall.totalAmount) * 100"
              ></div>
            </div>
          </div>
        </app-info-card>
      </div>
    </div>
  </div>

  <div *ngIf="loading$ | async" class="loading-overlay">
    <div class="spinner"></div>
    <p>Loading stats...</p>
  </div>
</div>
